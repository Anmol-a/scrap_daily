name: Weekly New Products

on:
  schedule:
    - cron: '30 20 * * 0'   # 2:00 AM IST every Sunday
  workflow_dispatch:

jobs:
  weekly-scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 480

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Chrome (latest stable, version auto-detected by scraper)
        run: |
          wget -q https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt install -y ./google-chrome-stable_current_amd64.deb
          echo "Chrome version: $(google-chrome --version)"

      - name: Install Python dependencies
        run: |
          pip install selenium undetected-chromedriver supabase python-dotenv requests

      - name: Run weekly scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          AFFILIATE_TAG: sync8in-21
        run: |
          python3 scrapers/scraper.py weekly

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weekly-logs-${{ github.run_number }}
          path: logs/
          retention-days: 7