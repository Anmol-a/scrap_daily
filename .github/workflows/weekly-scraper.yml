name: Weekly Spec Backfill

on:
  schedule:
    - cron: '30 21 * * 6'   # Sun 3:00 AM IST = Sat 21:30 UTC
  workflow_dispatch:

jobs:
  fill-specs:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Stagger start
        run: sleep $(( RANDOM % 120 ))

      - name: Run specs backfill — shard ${{ matrix.shard }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          AFFILIATE_TAG: sync8in-21
        run: |
          python scrapers/scraper.py specs --shard ${{ matrix.shard }} --total-shards 3

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: specs-logs-shard-${{ matrix.shard }}
          path: logs/
          retention-days: 7