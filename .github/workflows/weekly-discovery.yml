name: Weekly Product Discovery
on:
  schedule:
    - cron: '0 20 * * 6'   # Sat 1:30 AM IST
  workflow_dispatch:
jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    strategy:
      fail-fast: false
      matrix:
        category: [mobiles, laptops, tablets, earphones, accessories, tvs, smart_watches]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install -r requirements.txt
      - name: Run discovery — ${{ matrix.category }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python3 scrapers/scraper.py weekly --category ${{ matrix.category }}

  notify-failure:
    needs: discover
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Send Telegram alert
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="❌ sync8 weekly discovery failed — run ${{ github.run_number }}. https://github.com/Anmol-a/scrap_daily/actions/runs/${{ github.run_id }}"