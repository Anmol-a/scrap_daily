name: Daily Price Scraper

on:
  schedule:
    - cron: '30 0 * * *'   # 6:00 AM IST = 00:30 UTC
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 240    # 4h hard stop per shard — safety margin under the 6h platform cap
    strategy:
      fail-fast: false      # one shard failing shouldn't cancel the others
      matrix:
        shard: [0, 1, 2, 3, 4, 5]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Chrome (latest stable, force fresh)
        run: |
          sudo apt-get update
          sudo apt-get remove -y google-chrome-stable chromium-browser chromium 2>/dev/null || true
          sudo apt-get install -y google-chrome-stable
          echo "Chrome version: $(google-chrome --version)"

      - name: Install Python dependencies
        run: |
          pip install selenium undetected-chromedriver supabase python-dotenv requests

      # Small random stagger so all 6 shards don't hit Amazon in the exact
      # same second from 6 different IPs at job start.
      - name: Stagger start
        run: sleep $(( RANDOM % 120 ))

      - name: Run daily scraper — shard ${{ matrix.shard }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          AFFILIATE_TAG: sync8in-21
        run: |
          python3 scrapers/scraper.py daily --shard ${{ matrix.shard }} --total-shards 6

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-logs-shard-${{ matrix.shard }}-${{ github.run_number }}
          path: logs/
          retention-days: 7