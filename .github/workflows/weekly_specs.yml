name: Weekly Spec Enrichment

on:
  schedule:
    - cron: '30 21 * * 0'  # 3:00 AM IST every Sunday (1hr after weekly scraper)
  workflow_dispatch:

jobs:
  enrich-specs:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Chrome
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install python-dotenv supabase requests beautifulsoup4 undetected-chromedriver selenium

      - name: Run GSMArena enrichment
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python3 scrapers/gsmarena_specs.py

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: specs-logs-${{ github.run_number }}
          path: logs/